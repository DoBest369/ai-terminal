name: AITerminal
options:
  bundleIdPrefix: com.aiterminal
  deploymentTarget:
    macOS: "15.0"
    iOS: "17.0"
  createIntermediateGroups: true

packages:
  SwiftTerm:
    url: https://github.com/migueldeicaza/SwiftTerm
    from: "1.13.0"
  AITerminalCore:
    path: ../AITerminalCore

targets:
  AITerminal:
    type: application
    platform: [macOS, iOS]
    deploymentTarget:
      macOS: "15.0"
      iOS: "17.0"
    sources:
      - path: Sources
        excludes:
          - "DevTools/**"   # 截图/预览工具，仅用于 SPM 校验，不进发布 App
      - path: Resources
    dependencies:
      - package: SwiftTerm
        product: SwiftTerm
      - package: AITerminalCore
        product: AITerminalCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.aiterminal.app
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: AI Terminal
        SWIFT_VERSION: "5.0"
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.developer-tools
        ENABLE_HARDENED_RUNTIME: YES
      configs:
        debug:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG

schemes:
  AITerminal (macOS):
    build:
      targets:
        AITerminal_macOS: all
    run:
      config: Debug
  AITerminal (iOS):
    build:
      targets:
        AITerminal_iOS: all
    run:
      config: Debug
