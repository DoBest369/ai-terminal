name: CI 全平台在线编译

# 触发：① 手动 ② 推 ci-* tag（全平台对齐后用 ci-100/ci-200… 实现「每 100 迭代 CI 一次」）
on:
  workflow_dispatch:
  push:
    tags:
      - 'ci-*'

jobs:
  # apple：macOS runner 自带 Xcode → swift build + 核心自测（iOS/macOS 出包后续加）
  apple:
    name: Apple (macOS/iOS 源码)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Swift 版本
        run: swift --version
      - name: 编译 AITerminalCore
        run: swift build
        working-directory: apple/AITerminalCore
      - name: 编译 App（AppCheck）
        run: swift build
        working-directory: apple/App
      - name: 核心自测（8 项）
        working-directory: apple/App
        run: |
          for t in history batch risk metrics env-detect inspect notebook favorites; do
            echo "=== $t ==="
            swift run Shots --$t-test
          done

  # android：Ubuntu runner + JDK 17 + gradle 8.13 → assembleDebug
  android:
    name: Android (APK)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.13'
      - name: 编译 Debug APK
        run: gradle assembleDebug --no-daemon --console=plain
        working-directory: android
      - name: 上传 APK 产物
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: warn

  # linux：Rust 工具链 → cargo build（云端首次验证骨架；本机无 Rust 工具链）
  linux:
    name: Linux (Rust egui)
    runs-on: ubuntu-latest
    continue-on-error: true   # 骨架阶段允许失败，据结果推进对齐
    steps:
      - uses: actions/checkout@v4
      - name: 装系统依赖（egui/winit）
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev libxkbcommon-dev libssl-dev
      - name: Rust 版本
        run: rustc --version && cargo --version
      - name: 编译 linux/
        run: cargo build --release
        working-directory: linux

  # windows：Avalonia (C#/.NET 9) → dotnet build
  windows:
    name: Windows (Avalonia .NET9)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'
      - name: 编译 Windows Avalonia
        run: dotnet build -c Release
        working-directory: windows/TermindWindows
