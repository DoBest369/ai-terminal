<!DOCTYPE html>
<html lang="zh" data-theme="midnight">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1" />
  <title>SSH 终端</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="vendor/xterm.css" />
  <style>
    .form { padding: 14px 16px; display: grid; gap: 8px; }
    .form .row { display: flex; gap: 8px; }
    .form input {
      flex: 1; width: 100%; padding: 10px; border-radius: 8px;
      background: var(--bg); color: var(--text-primary);
      border: 1px solid var(--surface-light); font-size: 13px;
    }
    .form button {
      padding: 11px; border: none; border-radius: 9px;
      background: var(--accent); color: #fff; font-size: 14px; font-weight: 600;
    }
    .status { padding: 6px 16px; font-size: 12px; color: var(--text-secondary); }
    #term { flex: 1; min-height: 0; padding: 6px; background: var(--bg); }
    .term-wrap { display: none; flex-direction: column; flex: 1; min-height: 0; }
    .term-wrap.show { display: flex; }
    .form.hide { display: none; }
  </style>
</head>
<body>
  <div class="topbar">
    <a href="index.html" style="color:var(--text-secondary);text-decoration:none;font-size:18px;">‹</a>
    <h1>SSH 终端</h1>
  </div>

  <div class="form" id="form">
    <input id="relay" placeholder="中继地址 ws://localhost:8022" value="ws://localhost:8022" />
    <div class="row">
      <input id="host" placeholder="主机 host" />
      <input id="port" placeholder="端口" value="22" style="max-width:90px" />
    </div>
    <input id="user" placeholder="用户名" />
    <input id="pass" type="password" placeholder="密码" />
    <button id="connect">连接</button>
  </div>

  <div class="status" id="status">填写信息后点连接（需先运行 relay/）</div>

  <div class="term-wrap" id="termWrap">
    <div id="term"></div>
  </div>

  <script src="vendor/xterm.js"></script>
  <script src="vendor/xterm-addon-fit.js"></script>
  <script src="terminal.js"></script>
</body>
</html>
